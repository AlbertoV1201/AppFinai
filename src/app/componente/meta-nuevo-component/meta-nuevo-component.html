<mat-card class="meta-card">

  <mat-card-title>Metas de Ahorro</mat-card-title>

  <mat-card-content>

    <form [formGroup]="metaForm" class="meta-form">

      <!-- Nombre -->
      <div class="campo">

        <label>Nombre de la Meta</label>

        <input
          matInput
          formControlName="nombreMeta">

      </div>

      <!-- Monto Objetivo -->
      <div class="campo">

        <label>Monto Objetivo (S/)</label>

        <input
          matInput
          type="number"
          formControlName="montoObjetivo">

      </div>

      <!-- NUEVO -->
      <div class="campo">

        <label>Monto Ahorrado Actualmente (S/)</label>

        <input
          matInput
          type="number"
          formControlName="montoActual">

      </div>

      <!-- Fecha -->
      <div class="campo fecha">

        <label>Fecha Límite</label>

        <mat-form-field appearance="outline">

          <input
            matInput
            [matDatepicker]="picker"
            formControlName="fechaLimite">

          <mat-datepicker-toggle
            matSuffix
            [for]="picker">
          </mat-datepicker-toggle>

          <mat-datepicker #picker></mat-datepicker>

        </mat-form-field>

      </div>

      <!-- Descripción -->
      <div class="campo">

        <label>Descripción</label>

        <textarea
          rows="5"
          formControlName="descripcion">
        </textarea>

      </div>

      <button
        class="btn-confirmar"
        mat-raised-button
        color="primary"
        type="button"
        (click)="registrar()">

        Confirmar

      </button>

      <button
        class="btn-regresar"
        mat-raised-button
        color="primary"
        type="button"
        (click)="regresar()">

        Regresar

      </button>

    </form>

  </mat-card-content>

</mat-card>
