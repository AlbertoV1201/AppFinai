<mat-card class="presupuesto-card">

  <mat-card-title>Presupuestos</mat-card-title>

  <mat-card-content>

    <form [formGroup]="presupuestoForm" class="presupuesto-form">

      <div class="campo">
        <label>Nombre del Presupuesto</label>
        <input
          matInput
          formControlName="nombrePresupuesto">
      </div>

      <div class="campo">
        <label>Monto promedio del mes</label>
        <input
          matInput
          type="number"
          formControlName="montoPromedioMensual">
      </div>

      <button
        class="btn-confirmar"
        mat-raised-button
        color="primary"
        type="button"
        (click)="registrar()">
        Confirmar
      </button>

      <button
        class="btn-regresar"
        mat-raised-button
        color="primary"
        type="button"
        (click)="regresar()">
        Regresar
      </button>

    </form>

  </mat-card-content>

</mat-card>
