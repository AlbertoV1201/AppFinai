<mat-card class="dashboard-card">
  <mat-card-content>

    <h1>Hola, {{ resumen?.nombreUsuario }}</h1>

    <div class="saldo-card">
      <span class="saldo-icon">💳</span>
      <span>S/ {{ resumen?.saldoActual }}</span>
    </div>

    <div class="acciones">

      <div class="accion ingreso" (click)="irRegistrar('INGRESO')">
        <span>Ingresar Monto</span>

        <div class="accion-icon ingreso-icon">
          📈
        </div>
      </div>

      <div class="accion gasto" (click)="irRegistrar('GASTO')">
        <span>Ingresar Gastos</span>

        <div class="accion-icon gasto-icon">
          📉
        </div>
      </div>

    </div>

  </mat-card-content>
</mat-card>

<div class="tabla-container mat-elevation-z2">

  <div class="tabla-header">
    <h2>Movimientos</h2>
  </div>

  <table mat-table [dataSource]="dataSource" matSort>

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> N° </th>
      <td mat-cell *matCellDef="let element">
        {{ element.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef> Tipo </th>

      <td mat-cell *matCellDef="let element">

        <span
          [class.ingreso-badge]="element.tipo === 'INGRESO'"
          [class.gasto-badge]="element.tipo === 'GASTO'">

          {{ element.tipo }}

        </span>

      </td>
    </ng-container>

    <ng-container matColumnDef="monto">
      <th mat-header-cell *matHeaderCellDef> Monto </th>

      <td mat-cell *matCellDef="let element">

        <span
          [class.ingreso-text]="element.tipo === 'INGRESO'"
          [class.gasto-text]="element.tipo === 'GASTO'">

          S/ {{ element.monto }}

        </span>

      </td>
    </ng-container>

    <ng-container matColumnDef="creadoEn">
      <th mat-header-cell *matHeaderCellDef> Fecha </th>

      <td mat-cell *matCellDef="let element">
        {{ element.creadoEn | date:'dd/MM/yyyy' }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator
    [pageSizeOptions]="[5,10,20]"
    showFirstLastButtons>
  </mat-paginator>

</div>
