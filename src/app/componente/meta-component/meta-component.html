<h1 class="page-title">Metas</h1>

<button
  class="crear-card"
  type="button"
  mat-raised-button
  color="primary"
  (click)="irCrear()">

  <span>Crear Metas</span>
  <strong>+</strong>

</button>

<div
  class="tabla-container mat-elevation-z8"
  [hidden]="dataSource.data.length === 0">

  <table mat-table [dataSource]="dataSource" matSort>

    <!-- Nombre -->
    <ng-container matColumnDef="nombreMeta">

      <th mat-header-cell *matHeaderCellDef mat-sort-header>

        Nombre

      </th>

      <td mat-cell *matCellDef="let element">

        {{ element.nombreMeta }}

      </td>

    </ng-container>

    <!-- Objetivo -->
    <ng-container matColumnDef="montoObjetivo">

      <th mat-header-cell *matHeaderCellDef mat-sort-header>

        Objetivo

      </th>

      <td mat-cell *matCellDef="let element">

        S/ {{ element.montoObjetivo }}

      </td>

    </ng-container>

    <!-- Ahorrado -->
    <ng-container matColumnDef="montoActual">

      <th mat-header-cell *matHeaderCellDef mat-sort-header>

        Ahorrado

      </th>

      <td mat-cell *matCellDef="let element">

        S/ {{ element.montoActual }}

      </td>

    </ng-container>

    <!-- Estado -->
    <ng-container matColumnDef="estado">

      <th mat-header-cell *matHeaderCellDef mat-sort-header>

        Estado

      </th>

      <td mat-cell *matCellDef="let element">

        {{ obtenerEstado(element) }}

      </td>

    </ng-container>

    <!-- Fecha -->
    <ng-container matColumnDef="fechaLimite">

      <th mat-header-cell *matHeaderCellDef mat-sort-header>

        Fecha Límite

      </th>

      <td mat-cell *matCellDef="let element">

        {{ element.fechaLimite }}

      </td>

    </ng-container>

    <!-- Avance -->
    <ng-container matColumnDef="avance">

      <th mat-header-cell *matHeaderCellDef>

        Avance

      </th>

      <td mat-cell *matCellDef="let element">

        <mat-progress-bar
          mode="determinate"
          [value]="calcularAvance(element)">
        </mat-progress-bar>

        <div
          style="
          text-align:center;
          margin-top:6px;
          font-weight:bold;
          font-size:12px;">

          {{ calcularAvance(element) }} %

        </div>

      </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator
    [pageSizeOptions]="[5,10,20]"
    showFirstLastButtons>
  </mat-paginator>

</div>
