<div class="auth-page">
  <div class="shape shape-one"></div>
  <div class="shape shape-two"></div>
  <div class="shape shape-three"></div>

  <mat-card class="example-card registro-card">
    <a routerLink="/login" class="btn-regresar">Regresar</a>

    <mat-card-title>Crear Cuenta</mat-card-title>

    <mat-card-content>
      <form [formGroup]="usuarioForm" (ngSubmit)="onSubmit()" class="registro-form">
        <div class="grid-campos">
          <div class="campo">
            <label>Nombre</label>
            <input matInput formControlName="nombre" />
          </div>

          <div class="campo">
            <label>Apellido</label>
            <input matInput formControlName="apellido" />
          </div>

          <div class="campo">
            <label>Correo</label>
            <input matInput formControlName="correo" placeholder="usuario@gmail.com" />
          </div>

          <div class="campo">
            <label>telefono</label>
            <input matInput formControlName="telefono" />
          </div>
        </div>

        <div class="campo password-campo">
          <label>Contraseña</label>
          <input matInput type="password" formControlName="contrasena" />
        </div>

        <button type="submit" mat-raised-button color="primary" class="btn-crear">
          Crear
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
