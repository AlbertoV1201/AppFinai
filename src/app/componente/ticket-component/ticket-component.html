<h1 class="page-title">Tickets de Soporte</h1>

<button
  class="crear-card"
  mat-raised-button
  color="primary"
  (click)="irCrear()">

  <span>Crear Ticket</span>

  <strong>+</strong>

</button>

<div
  class="tabla-container mat-elevation-z8"
  [hidden]="dataSource.data.length === 0">

  <table
    mat-table
    [dataSource]="dataSource"
    matSort>

    <!-- Asunto -->
    <ng-container matColumnDef="asunto">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Asunto</th>
      <td mat-cell *matCellDef="let element">
        {{ element.asunto }}
      </td>
    </ng-container>

    <!-- Estado -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
      <td mat-cell *matCellDef="let element">
        {{ element.estado }}
      </td>
    </ng-container>

    <!-- Fecha -->
    <ng-container matColumnDef="creadoEn">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha</th>
      <td mat-cell *matCellDef="let element">
        {{ element.creadoEn | date:'dd/MM/yyyy' }}
      </td>
    </ng-container>

    <!-- Respuesta -->
    <ng-container matColumnDef="mensajeRespuesta">
      <th mat-header-cell *matHeaderCellDef>Respuesta</th>
      <td mat-cell *matCellDef="let element">
        {{ element.mensajeRespuesta || 'Pendiente' }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator
    [pageSizeOptions]="[5,10,20]"
    showFirstLastButtons>
  </mat-paginator>

</div>
